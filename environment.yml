# Conda environment for gsplat MPS (Apple Silicon) development.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate gsplat-mps
#   BUILD_NO_CUDA=1 pip install -e .[dev]
#
# Notes:
#   - macOS / Apple Silicon only. CUDA-only extras (cupy, PLAS) are intentionally
#     excluded so env creation does not fail on arm64 macOS.
#   - PyTorch >=2.7 is required so `torch.mps.compile_shader` is available
#     (see docs/DEV.md). Installed via pip because the conda `pytorch` channel
#     ships older osx-arm64 builds that lack this symbol.
#   - Set PYTORCH_ENABLE_MPS_FALLBACK=1 when running tests (run_mps_tests.sh does this).
#   - Exact-version pins from setup.py's [dev] extras (pytest==7.1.3,
#     pylint==2.13.4, etc.) are not satisfiable on osx-arm64 + py3.11, so we
#     install those via pip after env creation rather than through conda.

name: gsplat-mps

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - setuptools>=42
  - wheel
  - ninja

  # Core runtime deps
  - numpy<2.0
  - pyyaml>=6.0.1
  - scipy

  # Docs toolchain
  - sphinx
  - furo
  - sphinx-copybutton
  - sphinx-design
  - sphinxcontrib-bibtex
  - sphinxcontrib-video

  - pip:
      # PyTorch with MPS + torch.mps.compile_shader (needs >=2.7).
      # Installed from PyPI because the conda `pytorch` channel lags behind
      # on osx-arm64 and ships builds without compile_shader.
      - torch>=2.7
      # Runtime
      - jaxtyping
      - rich>=12
      - imageio>=2.37.2
      - nerfacc>=0.5.3
      - torchpq>=0.3.0.6
      # Lint / format / test (pinned to match setup.py [dev])
      - black[jupyter]==22.3.0
      - isort==5.10.1
      - pylint==2.13.4
      - pytest==7.1.3
      - pytest-env==0.8.1
      - pytest-xdist==2.5.0
      - typeguard>=2.13.3
      - build
      - twine
      # After the env is created, install gsplat itself in editable mode with:
      #   BUILD_NO_CUDA=1 pip install -e .
      # (BUILD_NO_CUDA is read as an env var by setup.py; it skips the CUDA
      # extension build, which is not available on macOS.)
